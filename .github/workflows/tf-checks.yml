name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@7d78c7b4b3922e7577e222d4f48f1197c7d507c8 # pinned to latest
    with:
      provider: none
      working_directory: './_examples/complete/'
      provider: none

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@62909fc10e105bba5cba4ff73b03c020b97789d4 # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
